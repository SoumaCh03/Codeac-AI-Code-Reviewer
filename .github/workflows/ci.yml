name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install Poetry
      run: curl -sSL https://install.python-poetry.org | python3 -
      
    - name: Install dependencies
      working-directory: ./backend
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        poetry install
        
    - name: Lint with flake8
      working-directory: ./backend
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        poetry run flake8 .
        
    - name: Run tests
      working-directory: ./backend
      run: |
        export PATH="$HOME/.local/bin:$PATH"
        # poetry run pytest

  frontend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
      
    - name: Lint
      working-directory: ./frontend
      run: npm run lint
      
    - name: Build
      working-directory: ./frontend
      run: npm run build
